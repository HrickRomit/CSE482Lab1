<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Hrick Romit</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index/index.html">Hrick Romit</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav">
                    <button type="button" class="btn btn-outline-primary" onclick="location.href='../index/index.html';">Home</button>
                    <button type="button" class="btn btn-outline-primary" onclick="location.href='../about/about.html';">About</button>
                    <button type="button" class="btn btn-outline-primary" onclick="location.href='../skills/skills.html';">Skills</button>
                    <button type="button" class="btn btn-outline-primary" onclick="location.href='../projects/projects.html';">Projects</button>
                    <button type="button" class="btn btn-outline-primary" onclick="location.href='contact.html';">Contact</button>
                </div>
            </div>
        </div>
    </nav>
    
    <div class="content">
        <h1 style="text-align: center;">Contact Me</h1>
        <h4>Feel free to reach out to me!</h4>

        <!-- Email Form -->
        <div class="row mb-3">
            <label for="emailInput" class="col-sm-2 col-form-label">Email</label>
            <div class="col-sm-8">
                <input type="email" class="form-control" id="emailInput" placeholder="Enter your email">
            </div>
            <div class="col-sm-2">
                <button type="button" class="btn btn-primary">Send</button>
            </div>
        </div>

        <!-- Facebook Form -->
        <div class="row mb-3">
            <label for="facebookInput" class="col-sm-2 col-form-label">Facebook</label>
            <div class="col-sm-8">
                <input type="text" class="form-control" id="facebookInput" placeholder="Enter your message">
            </div>
            <div class="col-sm-2">
                <button type="button" class="btn btn-primary">Send</button>
            </div>
        </div>
        <p>Or visit my Facebook profile: <a href="https://www.facebook.com/hrickromit">Hrick Romit</a></p>

        <!-- LinkedIn Form -->
        <div class="row mb-3">
            <label for="linkedinInput" class="col-sm-2 col-form-label">LinkedIn</label>
            <div class="col-sm-8">
                <input type="text" class="form-control" id="linkedinInput" placeholder="Enter your message">
            </div>
            <div class="col-sm-2">
                <button type="button" class="btn btn-primary">Send</button>
            </div>
        </div>
        <p>Or visit my LinkedIn profile: <a href="https://www.linkedin.com/in/hrickromit">Hrick Romit</a></p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
